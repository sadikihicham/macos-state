name: CI

# Porte serveur autoritaire : rejoue la porte locale (`make verify`) sur chaque
# push main et chaque PR. Contrairement aux git hooks (contournables via
# --no-verify), cette porte ne peut pas être sautée.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (tests + zéro-réseau)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: swift --version

      # make verify = swift test (incl. evals d'exactitude, batterie skip en VM)
      # + build release + scripts/check-no-network.sh (invariant zéro-réseau).
      - name: Verify
        run: make verify
